blueprint:
  name: "Moto GeoRide - Suivi complet (v30)"
  description: |
    # 🏍️ Moto GeoRide - Suivi complet

    Blueprint de gestion complète d'une moto équipée d'un tracker GeoRide.
    Créer **une instance par moto**. Utilise exclusivement les entités de l'intégration **georide_trips** — aucun helper externe nécessaire.

    *Version : 2026.03.14*

    ---

    ### ⛽ Autonomie carburant

    L'autonomie restante est calculée en temps réel par le sensor Python `sensor.<moto>_autonomie_restante`. Ce sensor utilise exclusivement `number.<moto>_autonomie_totale` comme référence — la moyenne calculée ne s'applique **jamais automatiquement**.

    À chaque confirmation de plein (dès le 2ème), le blueprint attend 6 min puis envoie une notification de proposition : **"📊 Nouvelle autonomie calculée : X km"** avec deux boutons :
    - **✅ Appliquer** → met à jour l'autonomie de référence via `button.<moto>_appliquer_autonomie_calculee`
    - **❌ Garder** → rien ne change, tu conserves ta valeur actuelle

    Le bouton `button.<moto>_appliquer_autonomie_calculee` est également utilisable manuellement depuis l'UI HA à tout moment.

    ### 🗺️ Notification nouveau trajet

    La fin de trajet est détectée par le **verrouillage du tracker** (`binary_sensor.<moto>_verrouille` → OFF = verrouillé), signal fiable d'arrêt définitif. Le blueprint appuie immédiatement sur **Refresh Trips** puis attend jusqu'à 3 min que `last_trip_sensor` se mette à jour. La notification part dès que les données sont fraîches.

    Aucun fallback sur le changement de `last_trip_sensor` — le verrouillage est l'unique déclencheur.

    ### 🔗 Entretien chaîne

    Alerte basée sur les km parcourus depuis le dernier entretien. Bouton **✅ Chaîne entretenue** pour enregistrer (odometer + date).

    ### 🛢️ Vidange

    Alerte basée sur les km parcourus depuis la dernière vidange. Bouton **✅ Vidange effectuée** pour enregistrer (odometer + date).

    ### 🔧 Révision générale

    Double critère : km **ET** jours. L'alerte se déclenche dès que l'un des deux seuils est atteint. Bouton **✅ Révision effectuée** pour enregistrer.

    ### 📅 Kilométrage périodique

    Snapshots automatiques à minuit (jour), lundi minuit (semaine) et au jour du mois configurable (mois).
    Les compteurs `sensor.<moto>_km_journaliers/hebdomadaires/mensuels` sont désormais calculés en Python — réactifs instantanément sans dépendre du blueprint.

    ### 📊 Bilans hebdomadaire et mensuel

    Envoyés à l'heure de votre choix : le **dimanche soir** pour le bilan hebdomadaire, le **dernier jour du mois** pour le bilan mensuel. Les compteurs ne sont pas encore réinitialisés à ce moment, garantissant des valeurs correctes.

    ---

    ### 📋 Prérequis

    - Intégration **georide_trips** installée et configurée
    - Application **Home Assistant Companion** installée pour les notifications

  domain: automation

  input:

    # ════════════════════════════════════════════════════════════════════════
    # SECTION 1 — IDENTITÉ
    # ════════════════════════════════════════════════════════════════════════

    section_identite:
      name: "🏍️ Identité de la moto"
      collapsed: false
      input:
        moto_nom:
          name: "Nom de la moto"
          description: >
            Utilisé dans toutes les notifications.
            **Exemples :** Africa Twin, R1200GS, S1000RR
          selector:
            text:

    # ════════════════════════════════════════════════════════════════════════
    # SECTION 2 — CAPTEURS PRINCIPAUX
    # ════════════════════════════════════════════════════════════════════════

    section_capteurs:
      name: "📡 Capteurs principaux (georide_trips)"
      collapsed: false
      input:
        odometer_sensor:
          name: "Capteur kilométrage (Odometer)"
          description: >
            `sensor.<moto>_odometer` — kilométrage réel avec offset.
          selector:
            entity:
              integration: georide_trips
              domain: sensor

        locked_sensor:
          name: "Capteur Verrouillé (Locked)"
          description: >
            `binary_sensor.<moto>_verrouille` — fourni nativement par georide_trips.
            Passe à `off` (= verrouillé) quand la moto est à l'arrêt confirmé (polling 5 min).
            Signal fiable de fin de trajet, insensible aux arrêts temporaires (feux rouges, etc.).
          selector:
            entity:
              integration: georide_trips
              domain: binary_sensor

        last_trip_sensor:
          name: "Capteur dernier trajet (Last Trip Details)"
          description: >
            ⚠️ Utiliser **Last Trip Details** (et non *Last Trip*).
            Il contient l'attribut `distance_km` nécessaire aux notifications.
          selector:
            entity:
              integration: georide_trips
              domain: sensor

        btn_refresh_trips:
          name: "Bouton Refresh Trips"
          description: >
            `button.<moto>_refresh_trips` — Déclenche un rafraîchissement immédiat des trajets récents.
            Appuyé automatiquement à chaque arrêt de la moto pour obtenir le dernier trajet sans attendre le polling horaire.
          selector:
            entity:
              integration: georide_trips
              domain: button


    # ════════════════════════════════════════════════════════════════════════
    # SECTION 3 — CARBURANT
    # ════════════════════════════════════════════════════════════════════════

    section_carburant:
      name: "⛽ Carburant"
      collapsed: true
      input:
        n_autonomie_totale:
          name: "Autonomie totale (km sur un plein)"
          description: "`number.<moto>_autonomie_totale`"
          selector:
            entity:
              integration: georide_trips
              domain: number

        n_seuil_alerte:
          name: "Seuil d'alerte autonomie (km)"
          description: >
            `number.<moto>_seuil_alerte_autonomie`
            Notification déclenchée quand les km restants passent sous ce seuil.
          selector:
            entity:
              integration: georide_trips
              domain: number

        n_km_dernier_plein:
          name: "KM au dernier plein"
          description: "`number.<moto>_km_au_dernier_plein`"
          selector:
            entity:
              integration: georide_trips
              domain: number

        sensor_autonomie_restante:
          name: "Sensor autonomie restante (km)"
          description: >
            `sensor.<moto>_autonomie_restante`
            Calculé en temps réel par l'intégration (moyenne glissante sur 3 pleins).
            Utilisé pour déclencher l'alerte et afficher l'autonomie dans les bilans.
          selector:
            entity:
              integration: georide_trips
              domain: sensor

        btn_confirmer_le_plein:
          name: "Bouton — Confirmer le plein"
          description: >
            `button.<moto>_confirmer_le_plein`
            Enregistre l'odometer précis au moment du plein (via API après 5 min d'arrêt)
            et met à jour la moyenne glissante. Désactive aussi le switch Faire le plein.
          selector:
            entity:
              integration: georide_trips
              domain: button

        switch_faire_le_plein:
          name: "Binary Sensor — Plein requis"
          description: >
            `binary_sensor.<moto>_plein_requis`
            Passe `on` automatiquement quand l'autonomie passe sous le seuil.
            Read-only — calculé en temps réel par l'intégration.
          selector:
            entity:
              integration: georide_trips
              domain: binary_sensor

        btn_appliquer_autonomie:
          name: "Bouton — Appliquer l'autonomie calculée"
          description: >
            `button.<moto>_appliquer_autonomie_calculee`
            Copie la moyenne glissante dans l'autonomie totale de référence.
            Appuyé automatiquement si tu confirmes via la notification de proposition.
          selector:
            entity:
              integration: georide_trips
              domain: button

    # ════════════════════════════════════════════════════════════════════════
    # SECTION 5 — ENTRETIEN : CHAÎNE
    # ════════════════════════════════════════════════════════════════════════

    section_chaine:
      name: "🔗 Entretien chaîne"
      collapsed: true
      input:
        n_intervalle_km_chaine:
          name: "Intervalle km entre entretiens"
          description: "`number.<moto>_entretien_chaine_intervalle_km`"
          selector:
            entity:
              integration: georide_trips
              domain: number

        n_seuil_alerte_chaine:
          name: "Seuil d'alerte (km restants)"
          description: "`number.<moto>_entretien_chaine_seuil_alerte`"
          selector:
            entity:
              integration: georide_trips
              domain: number

        n_km_dernier_entretien_chaine:
          name: "KM au dernier entretien"
          description: "`number.<moto>_entretien_chaine_km_au_dernier_entretien`"
          selector:
            entity:
              integration: georide_trips
              domain: number

        dt_date_dernier_entretien_chaine:
          name: "Date du dernier entretien"
          description: "`datetime.<moto>_entretien_chaine_date_dernier_entretien`"
          selector:
            entity:
              integration: georide_trips
              domain: datetime

        switch_entretien_chaine:
          name: "Binary Sensor — Entretien chaîne requis"
          description: >
            `binary_sensor.<moto>_chaine_requise`
            Passe `on` automatiquement quand les km restants passent sous le seuil.
            Read-only — calculé en temps réel par l'intégration.
          selector:
            entity:
              integration: georide_trips
              domain: binary_sensor

        btn_enregistrer_chaine:
          name: "Bouton enregistrer entretien chaîne"
          description: >
            Bouton natif georide_trips.
            Déclenche la même séquence que la confirmation mobile.
          selector:
            entity:
              integration: georide_trips
              domain: button

    # ════════════════════════════════════════════════════════════════════════
    # SECTION 6 — ENTRETIEN : VIDANGE
    # ════════════════════════════════════════════════════════════════════════

    section_vidange:
      name: "🛢️ Vidange"
      collapsed: true
      input:
        n_intervalle_km_vidange:
          name: "Intervalle km entre vidanges"
          description: "`number.<moto>_vidange_intervalle_km`"
          selector:
            entity:
              integration: georide_trips
              domain: number

        n_seuil_alerte_vidange:
          name: "Seuil d'alerte (km restants)"
          description: "`number.<moto>_vidange_seuil_alerte`"
          selector:
            entity:
              integration: georide_trips
              domain: number

        n_km_dernier_entretien_vidange:
          name: "KM à la dernière vidange"
          description: "`number.<moto>_vidange_km_a_la_derniere_vidange`"
          selector:
            entity:
              integration: georide_trips
              domain: number

        dt_date_dernier_entretien_vidange:
          name: "Date de la dernière vidange"
          description: "`datetime.<moto>_vidange_date_derniere_vidange`"
          selector:
            entity:
              integration: georide_trips
              domain: datetime

        switch_entretien_vidange:
          name: "Binary Sensor — Vidange requise"
          description: >
            `binary_sensor.<moto>_vidange_requise`
            Passe `on` automatiquement quand les km restants passent sous le seuil.
            Read-only — calculé en temps réel par l'intégration.
          selector:
            entity:
              integration: georide_trips
              domain: binary_sensor

        btn_enregistrer_vidange:
          name: "Bouton enregistrer vidange"
          description: >
            Bouton natif georide_trips.
            Déclenche la même séquence que la confirmation mobile.
          selector:
            entity:
              integration: georide_trips
              domain: button

    # ════════════════════════════════════════════════════════════════════════
    # SECTION 7 — ENTRETIEN : RÉVISION GÉNÉRALE
    # ════════════════════════════════════════════════════════════════════════

    section_revision:
      name: "🔧 Révision générale"
      collapsed: true
      input:
        n_intervalle_km_revision:
          name: "Intervalle km entre révisions"
          description: "`number.<moto>_revision_intervalle_km`"
          selector:
            entity:
              integration: georide_trips
              domain: number

        n_intervalle_jours_revision:
          name: "Intervalle maximum en jours"
          description: >
            `number.<moto>_revision_intervalle_jours`
            L'alerte se déclenche si l'un des deux critères (km **ou** jours) est atteint.
          selector:
            entity:
              integration: georide_trips
              domain: number

        n_seuil_alerte_revision:
          name: "Seuil d'alerte (km restants)"
          description: "`number.<moto>_revision_seuil_alerte`"
          selector:
            entity:
              integration: georide_trips
              domain: number

        n_km_dernier_entretien_revision:
          name: "KM à la dernière révision"
          description: "`number.<moto>_revision_km_a_la_derniere_revision`"
          selector:
            entity:
              integration: georide_trips
              domain: number

        dt_date_dernier_entretien_revision:
          name: "Date de la dernière révision"
          description: "`datetime.<moto>_revision_date_derniere_revision`"
          selector:
            entity:
              integration: georide_trips
              domain: datetime

        switch_entretien_revision:
          name: "Binary Sensor — Révision requise"
          description: >
            `binary_sensor.<moto>_revision_requise`
            Passe `on` automatiquement quand km OU délai passent sous le seuil.
            Read-only — calculé en temps réel par l'intégration.
          selector:
            entity:
              integration: georide_trips
              domain: binary_sensor

        btn_enregistrer_revision:
          name: "Bouton enregistrer révision"
          description: >
            Bouton natif georide_trips.
            Déclenche la même séquence que la confirmation mobile.
          selector:
            entity:
              integration: georide_trips
              domain: button

    # ════════════════════════════════════════════════════════════════════════
    # SECTION 8 — NOTIFICATIONS & TRAJETS
    # ════════════════════════════════════════════════════════════════════════

    section_notifications:
      name: "🔔 Notifications & Trajets"
      collapsed: false
      input:
        notify_service:
          name: "Service de notification mobile"
          description: >
            Format : `notify.nom_du_service`
            Retrouvez vos services dans **Outils de développement → Services** (domaine `notify`).
          default: "notify."
          selector:
            text:

        notif_autonomie_active:
          name: "Activer — Alerte autonomie carburant"
          default: true
          selector:
            boolean:

        notif_trajet_active:
          name: "Activer — Notification nouveau trajet"
          default: true
          selector:
            boolean:

        notif_chaine_active:
          name: "Activer — Alerte entretien chaîne"
          default: true
          selector:
            boolean:

        notif_vidange_active:
          name: "Activer — Alerte vidange"
          default: true
          selector:
            boolean:

        notif_revision_active:
          name: "Activer — Alerte révision générale"
          default: true
          selector:
            boolean:

        n_seuil_distance_trajet:
          name: "Seuil minimum pour notifier un trajet (km)"
          description: >
            `number.<moto>_seuil_notification_trajet`
            Les trajets inférieurs à cette distance ne génèrent pas de notification.
          selector:
            entity:
              integration: georide_trips
              domain: number

    # ════════════════════════════════════════════════════════════════════════
    # SECTION 9 — ACTIONS MOBILES
    # ════════════════════════════════════════════════════════════════════════

    section_actions:
      name: "📲 Actions mobiles (identifiants uniques)"
      collapsed: true
      input:
        action_plein:
          name: "Action mobile — Confirmer le plein"
          description: >
            Identifiant unique, **différent pour chaque moto**.
            **Exemple :** `PLEIN_AFRICA_TWIN`
          selector:
            text:

        action_appliquer_autonomie:
          name: "Action mobile — Appliquer l'autonomie calculée"
          description: >
            Identifiant unique, **différent pour chaque moto**.
            Utilisé par la notification de proposition après chaque plein (dès le 2ème).
            **Exemple :** `APPLIQUER_AUTO_AFRICA_TWIN`
          selector:
            text:

        action_chaine:
          name: "Action mobile — Confirmer entretien chaîne"
          description: >
            Identifiant unique par moto.
            **Exemple :** `CHAINE_AFRICA_TWIN`
          selector:
            text:

        action_vidange:
          name: "Action mobile — Confirmer vidange"
          description: >
            Identifiant unique par moto.
            **Exemple :** `VIDANGE_AFRICA_TWIN`
          selector:
            text:

        action_revision:
          name: "Action mobile — Confirmer révision"
          description: >
            Identifiant unique par moto.
            **Exemple :** `REVISION_AFRICA_TWIN`
          selector:
            text:

    # ════════════════════════════════════════════════════════════════════════
    # SECTION 9b — PERSONNALISATION DES NOTIFICATIONS
    # ════════════════════════════════════════════════════════════════════════

    section_notif_custom:
      name: "✏️ Personnalisation des notifications"
      collapsed: true
      input:

        # ── TRAJET ──────────────────────────────────────────────────────────
        notif_trajet_titre:
          name: "Trajet — Titre"
          description: >
            Variables disponibles : `{{ moto_nom }}`, `{{ distance_trajet | round(1) }}`,
            `{{ odometer_km_frais | round(0) }}`, `{{ km_restants_trajet }}`
          default: "🏍️ Trajet — {{ moto_nom }}"
          selector:
            text:

        notif_trajet_message:
          name: "Trajet — Message"
          description: >
            Variables : `{{ distance_trajet | round(1) }}` (km du trajet),
            `{{ odometer_km_frais | round(0) }}` (km total),
            `{{ km_restants_trajet }}` (autonomie restante km).
          default: "{{ distance_trajet | round(1) }} km parcourus.\nAutonomie restante : {{ km_restants_trajet }} km."
          selector:
            text:
              multiline: true

        notif_trajet_persistante:
          name: "Trajet — Notification persistante dans HA"
          default: false
          selector:
            boolean:

        # ── AUTONOMIE ────────────────────────────────────────────────────────
        notif_autonomie_titre:
          name: "Autonomie — Titre"
          description: >
            Variables : `{{ moto_nom }}`, `{{ km_restants }}` (autonomie restante), `{{ odometer_km | round(0) }}`
          default: "⛽ Plein à faire — {{ moto_nom }}"
          selector:
            text:

        notif_autonomie_message:
          name: "Autonomie — Message"
          description: >
            Variables : `{{ km_restants }}` (km autonomie restante), `{{ odometer_km | round(0) }}` (km total).
          default: "Il reste {{ km_restants }} km d'autonomie.\nKilométrage actuel : {{ odometer_km | round(0) }} km."
          selector:
            text:
              multiline: true

        notif_autonomie_persistante:
          name: "Autonomie — Notification persistante dans HA"
          default: false
          selector:
            boolean:

        # ── CHAÎNE ──────────────────────────────────────────────────────────
        notif_chaine_titre:
          name: "Chaîne — Titre"
          description: >
            Variables : `{{ moto_nom }}`, `{{ km_depuis_chaine }}`, `{{ km_restants_chaine }}`
          default: "🔗 Entretien chaîne — {{ moto_nom }}"
          selector:
            text:

        notif_chaine_message:
          name: "Chaîne — Message"
          description: >
            Variables : `{{ km_depuis_chaine }}` (km depuis dernier entretien),
            `{{ km_restants_chaine }}` (km restants avant échéance).
          default: "{{ km_depuis_chaine }} km depuis le dernier entretien.\nIl reste {{ km_restants_chaine }} km avant l'échéance.\nDernier entretien : {{ (states(dt_date_dernier_entretien_chaine) | as_datetime | as_local).strftime('%d/%m/%Y') }}."
          selector:
            text:
              multiline: true

        notif_chaine_persistante:
          name: "Chaîne — Notification persistante dans HA"
          default: false
          selector:
            boolean:

        # ── VIDANGE ─────────────────────────────────────────────────────────
        notif_vidange_titre:
          name: "Vidange — Titre"
          description: >
            Variables : `{{ moto_nom }}`, `{{ km_depuis_vidange }}`, `{{ km_restants_vidange }}`
          default: "🛢️ Vidange à faire — {{ moto_nom }}"
          selector:
            text:

        notif_vidange_message:
          name: "Vidange — Message"
          description: >
            Variables : `{{ km_depuis_vidange }}`, `{{ km_restants_vidange }}`.
          default: "{{ km_depuis_vidange }} km depuis la dernière vidange.\nIl reste {{ km_restants_vidange }} km avant l'échéance.\nDernière vidange : {{ (states(dt_date_dernier_entretien_vidange) | as_datetime | as_local).strftime('%d/%m/%Y') }}."
          selector:
            text:
              multiline: true

        notif_vidange_persistante:
          name: "Vidange — Notification persistante dans HA"
          default: false
          selector:
            boolean:

        # ── RÉVISION ────────────────────────────────────────────────────────
        notif_revision_titre:
          name: "Révision — Titre"
          description: >
            Variables : `{{ moto_nom }}`, `{{ km_depuis_revision }}`, `{{ km_restants_revision }}`,
            `{{ jours_depuis_revision }}`, `{{ jours_restants_revision }}`
          default: "🔧 Révision à prévoir — {{ moto_nom }}"
          selector:
            text:

        notif_revision_message:
          name: "Révision — Message"
          description: >
            Variables : `{{ km_depuis_revision }}`, `{{ km_restants_revision }}`,
            `{{ jours_depuis_revision }}`, `{{ jours_restants_revision }}`,
            `{{ alerte_revision_km }}` (booléen), `{{ alerte_revision_jours }}` (booléen).
          default: >
            {% if alerte_revision_km and alerte_revision_jours %}Révision urgente : km ET délai atteints.
            {% elif alerte_revision_km %}Révision proche par kilométrage.
            {% else %}Révision proche par délai.{% endif %}
            {{ km_depuis_revision }} km parcourus ({{ km_restants_revision }} km restants).
            {{ jours_depuis_revision }} jours écoulés ({{ jours_restants_revision }} jours restants).
            Dernière révision : {{ (states(dt_date_dernier_entretien_revision) | as_datetime | as_local).strftime('%d/%m/%Y') }}.
          selector:
            text:
              multiline: true

        notif_revision_persistante:
          name: "Révision — Notification persistante dans HA"
          default: false
          selector:
            boolean:


    # ════════════════════════════════════════════════════════════════════════
    # SECTION 9b — ALARMES
    # ════════════════════════════════════════════════════════════════════════

    section_alarmes:
      name: "🚨 Alarmes"
      collapsed: true
      input:
        last_alarm_sensor:
          name: "Capteur dernière alarme (Last Alarm)"
          description: >
            `sensor.<moto>_last_alarm` — fourni par georide_trips.
            Change d'état à chaque nouvelle alarme reçue via Socket.IO.
            Expose aussi `timestamp` et `device_name` en attributs.
          selector:
            entity:
              integration: georide_trips
              domain: sensor

        notif_alarme_crash:
          name: "Activer — Alerte chute/crash"
          description: "Notifie pour les alarmes `alarm_crash` et `alarm_crashParking`."
          default: true
          selector:
            boolean:

        notif_alarme_vol:
          name: "Activer — Alerte vibration / mouvement suspect"
          description: "Notifie pour l'alarme `alarm_vibration` (détection de mouvement suspect)."
          default: true
          selector:
            boolean:

        notif_alarme_alimentation:
          name: "Activer — Alerte coupure alimentation"
          description: "Notifie pour les alarmes `alarm_powerCut` et `alarm_powerUncut`."
          default: false
          selector:
            boolean:

        notif_alarme_autres:
          name: "Activer — Autres alarmes (zone, batterie, température…)"
          description: >
            Notifie pour les alarmes non couvertes ci-dessus :
            `alarm_exitZone`, `alarm_batteryWarning`, `alarm_temperatureWarning`,
            `alarm_deviceOffline`, `alarm_deviceOnline`, `alarm_magnetOn/Off`, `alarm_sonorAlarmOn`.
          default: false
          selector:
            boolean:

    # ════════════════════════════════════════════════════════════════════════
    # SECTION 10 — BILAN HEBDOMADAIRE
    # ════════════════════════════════════════════════════════════════════════

    section_hebdo:
      name: "📊 Bilan hebdomadaire"
      collapsed: true
      input:
        activer_stats_hebdo:
          name: "Activer le bilan hebdomadaire"
          default: true
          selector:
            boolean:

        heure_stats_hebdo:
          name: "Heure d'envoi du bilan hebdomadaire (dimanche soir)"
          default: "20:00:00"
          selector:
            time:

        stats_hebdo_mobile:
          name: "Bilan hebdo — Notification mobile"
          default: true
          selector:
            boolean:

        stats_hebdo_persistante:
          name: "Bilan hebdo — Notification persistante dans HA"
          default: true
          selector:
            boolean:

    # ════════════════════════════════════════════════════════════════════════
    # SECTION 11 — BILAN MENSUEL
    # ════════════════════════════════════════════════════════════════════════

    section_mensuel:
      name: "📊 Bilan mensuel"
      collapsed: true
      input:
        activer_stats_mensuelles:
          name: "Activer le bilan mensuel"
          default: true
          selector:
            boolean:

        heure_stats_mensuelles:
          name: "Heure d'envoi du bilan mensuel (dernier jour du mois)"
          default: "20:00:00"
          selector:
            time:

        stats_mensuelles_mobile:
          name: "Bilan mensuel — Notification mobile"
          default: true
          selector:
            boolean:

        stats_mensuelles_persistante:
          name: "Bilan mensuel — Notification persistante dans HA"
          default: true
          selector:
            boolean:

# ════════════════════════════════════════════════════════════════════════════
# VARIABLES GLOBALES
# ════════════════════════════════════════════════════════════════════════════
variables:
  moto_nom: !input moto_nom
  odometer_sensor: !input odometer_sensor
  n_autonomie_totale: !input n_autonomie_totale
  n_seuil_alerte: !input n_seuil_alerte
  n_km_dernier_plein: !input n_km_dernier_plein
  sensor_autonomie_restante: !input sensor_autonomie_restante
  btn_confirmer_le_plein: !input btn_confirmer_le_plein
  switch_faire_le_plein: !input switch_faire_le_plein
  btn_appliquer_autonomie: !input btn_appliquer_autonomie
  switch_entretien_chaine: !input switch_entretien_chaine
  switch_entretien_vidange: !input switch_entretien_vidange
  switch_entretien_revision: !input switch_entretien_revision
  n_intervalle_km_chaine: !input n_intervalle_km_chaine
  n_seuil_alerte_chaine: !input n_seuil_alerte_chaine
  n_km_dernier_entretien_chaine: !input n_km_dernier_entretien_chaine
  dt_date_dernier_entretien_chaine: !input dt_date_dernier_entretien_chaine
  n_intervalle_km_vidange: !input n_intervalle_km_vidange
  n_seuil_alerte_vidange: !input n_seuil_alerte_vidange
  n_km_dernier_entretien_vidange: !input n_km_dernier_entretien_vidange
  dt_date_dernier_entretien_vidange: !input dt_date_dernier_entretien_vidange
  n_intervalle_km_revision: !input n_intervalle_km_revision
  n_intervalle_jours_revision: !input n_intervalle_jours_revision
  n_seuil_alerte_revision: !input n_seuil_alerte_revision
  n_km_dernier_entretien_revision: !input n_km_dernier_entretien_revision
  dt_date_dernier_entretien_revision: !input dt_date_dernier_entretien_revision
  n_seuil_distance_trajet: !input n_seuil_distance_trajet
  notify_service: !input notify_service
  notif_autonomie_active: !input notif_autonomie_active
  notif_trajet_active: !input notif_trajet_active
  notif_chaine_active: !input notif_chaine_active
  notif_vidange_active: !input notif_vidange_active
  notif_revision_active: !input notif_revision_active
  action_plein: !input action_plein
  action_appliquer_autonomie: !input action_appliquer_autonomie
  action_chaine: !input action_chaine
  action_vidange: !input action_vidange
  action_revision: !input action_revision
  # Note : les inputs de personnalisation des notifications (notif_*_titre, notif_*_message,
  # notif_*_persistante) ne sont PAS stockés en variables globales car leurs valeurs par défaut
  # contiennent des templates Jinja2 dynamiques (ex: {{ distance_trajet }}) qui ne sont pas
  # encore définies à ce stade. Ils sont utilisés directement via !input dans les actions.
  btn_enregistrer_chaine: !input btn_enregistrer_chaine
  btn_enregistrer_vidange: !input btn_enregistrer_vidange
  btn_enregistrer_revision: !input btn_enregistrer_revision
  btn_refresh_trips: !input btn_refresh_trips
  activer_stats_hebdo: !input activer_stats_hebdo
  activer_stats_mensuelles: !input activer_stats_mensuelles
  stats_hebdo_mobile: !input stats_hebdo_mobile
  stats_hebdo_persistante: !input stats_hebdo_persistante
  stats_mensuelles_mobile: !input stats_mensuelles_mobile
  stats_mensuelles_persistante: !input stats_mensuelles_persistante
  last_alarm_sensor: !input last_alarm_sensor
  notif_alarme_crash: !input notif_alarme_crash
  notif_alarme_vol: !input notif_alarme_vol
  notif_alarme_alimentation: !input notif_alarme_alimentation
  notif_alarme_autres: !input notif_alarme_autres
  locked_sensor: !input locked_sensor

# ════════════════════════════════════════════════════════════════════════════
# TRIGGERS
# ════════════════════════════════════════════════════════════════════════════
triggers:

  - trigger: state
    entity_id: !input locked_sensor
    to: "off"
    id: moto_verrouillee
    not_from:
      - "unavailable"
      - "unknown"

  - trigger: time
    at: !input heure_stats_hebdo
    id: stats_hebdo

  - trigger: time
    at: !input heure_stats_mensuelles
    id: stats_mensuelles

  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: !input action_plein
    id: confirm_plein

  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: !input action_appliquer_autonomie
    id: confirm_appliquer_autonomie

  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: !input action_chaine
    id: confirm_chaine

  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: !input action_vidange
    id: confirm_vidange

  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: !input action_revision
    id: confirm_revision

  - trigger: state
    entity_id: !input btn_enregistrer_chaine
    id: confirm_chaine
    not_from:
      - "unavailable"
      - "unknown"
    not_to:
      - "unavailable"
      - "unknown"

  - trigger: state
    entity_id: !input btn_enregistrer_vidange
    id: confirm_vidange
    not_from:
      - "unavailable"
      - "unknown"
    not_to:
      - "unavailable"
      - "unknown"

  - trigger: state
    entity_id: !input btn_enregistrer_revision
    id: confirm_revision
    not_from:
      - "unavailable"
      - "unknown"
    not_to:
      - "unavailable"
      - "unknown"

  - trigger: state
    entity_id: !input last_alarm_sensor
    id: nouvelle_alarme
    not_from:
      - "unavailable"
      - "unknown"
    not_to:
      - "unavailable"
      - "unknown"

  # Triggers binary sensors calculés — notification envoyée exactement une fois
  # lors du passage off→on (seuil franchi). Pas d'anti-doublon manuel nécessaire.

  - trigger: state
    entity_id: !input switch_faire_le_plein
    from: "off"
    to: "on"
    id: alerte_plein

  - trigger: state
    entity_id: !input switch_entretien_chaine
    from: "off"
    to: "on"
    id: alerte_chaine

  - trigger: state
    entity_id: !input switch_entretien_vidange
    from: "off"
    to: "on"
    id: alerte_vidange

  - trigger: state
    entity_id: !input switch_entretien_revision
    from: "off"
    to: "on"
    id: alerte_revision

# ════════════════════════════════════════════════════════════════════════════
# ACTIONS
# ════════════════════════════════════════════════════════════════════════════
actions:
  - choose:

    # ══════════════════════════════════════════════════════════════════════
    # ⛽ ALERTE PLEIN — binary_sensor off→on
    # ══════════════════════════════════════════════════════════════════════
    - conditions:
        - condition: trigger
          id: alerte_plein
        - condition: template
          value_template: "{{ notif_autonomie_active }}"
      sequence:
        - variables:
            odometer_km: "{{ states(odometer_sensor) | float(0) }}"
            km_restants: "{{ states(sensor_autonomie_restante) | float(0) | round(1) }}"
        - action: "{{ notify_service }}"
          data:
            title: !input notif_autonomie_titre
            message: !input notif_autonomie_message
            data:
              actions:
                - action: "{{ action_plein }}"
                  title: "✅ Plein effectué"
        - if:
            - condition: template
              value_template: !input notif_autonomie_persistante
          then:
            - action: persistent_notification.create
              data:
                title: !input notif_autonomie_titre
                message: !input notif_autonomie_message
                notification_id: "autonomie_{{ moto_nom | slugify }}"

    # ══════════════════════════════════════════════════════════════════════
    # 🔗 ALERTE CHAÎNE — binary_sensor off→on
    # ══════════════════════════════════════════════════════════════════════
    - conditions:
        - condition: trigger
          id: alerte_chaine
        - condition: template
          value_template: "{{ notif_chaine_active }}"
      sequence:
        - variables:
            odometer_km: "{{ states(odometer_sensor) | float(0) }}"
            km_depuis_chaine: "{{ [odometer_km - states(n_km_dernier_entretien_chaine) | float(0), 0] | max | round(0) }}"
            km_restants_chaine: "{{ [states(n_intervalle_km_chaine) | float(500) - km_depuis_chaine, 0] | max | round(0) }}"
        - action: "{{ notify_service }}"
          data:
            title: !input notif_chaine_titre
            message: !input notif_chaine_message
            data:
              actions:
                - action: "{{ action_chaine }}"
                  title: "✅ Chaîne entretenue"
        - if:
            - condition: template
              value_template: !input notif_chaine_persistante
          then:
            - action: persistent_notification.create
              data:
                title: !input notif_chaine_titre
                message: !input notif_chaine_message
                notification_id: "chaine_{{ moto_nom | slugify }}"

    # ══════════════════════════════════════════════════════════════════════
    # 🛢️ ALERTE VIDANGE — binary_sensor off→on
    # ══════════════════════════════════════════════════════════════════════
    - conditions:
        - condition: trigger
          id: alerte_vidange
        - condition: template
          value_template: "{{ notif_vidange_active }}"
      sequence:
        - variables:
            odometer_km: "{{ states(odometer_sensor) | float(0) }}"
            km_depuis_vidange: "{{ [odometer_km - states(n_km_dernier_entretien_vidange) | float(0), 0] | max | round(0) }}"
            km_restants_vidange: "{{ [states(n_intervalle_km_vidange) | float(6000) - km_depuis_vidange, 0] | max | round(0) }}"
        - action: "{{ notify_service }}"
          data:
            title: !input notif_vidange_titre
            message: !input notif_vidange_message
            data:
              actions:
                - action: "{{ action_vidange }}"
                  title: "✅ Vidange effectuée"
        - if:
            - condition: template
              value_template: !input notif_vidange_persistante
          then:
            - action: persistent_notification.create
              data:
                title: !input notif_vidange_titre
                message: !input notif_vidange_message
                notification_id: "vidange_{{ moto_nom | slugify }}"

    # ══════════════════════════════════════════════════════════════════════
    # 🔧 ALERTE RÉVISION — binary_sensor off→on
    # ══════════════════════════════════════════════════════════════════════
    - conditions:
        - condition: trigger
          id: alerte_revision
        - condition: template
          value_template: "{{ notif_revision_active }}"
      sequence:
        - variables:
            odometer_km: "{{ states(odometer_sensor) | float(0) }}"
            km_depuis_revision: "{{ [odometer_km - states(n_km_dernier_entretien_revision) | float(0), 0] | max | round(0) }}"
            km_restants_revision: "{{ [states(n_intervalle_km_revision) | float(6000) - km_depuis_revision, 0] | max | round(0) }}"
            jours_depuis_revision: "{{ ((now() - (states(dt_date_dernier_entretien_revision) | as_datetime | as_local)).days) | int(0) }}"
            jours_restants_revision: "{{ [states(n_intervalle_jours_revision) | int(365) - jours_depuis_revision, 0] | max }}"
            alerte_revision_km: "{{ km_restants_revision <= states(n_seuil_alerte_revision) | float(500) }}"
            alerte_revision_jours: "{{ jours_restants_revision <= 30 }}"
        - action: "{{ notify_service }}"
          data:
            title: !input notif_revision_titre
            message: !input notif_revision_message
            data:
              actions:
                - action: "{{ action_revision }}"
                  title: "✅ Révision effectuée"
        - if:
            - condition: template
              value_template: !input notif_revision_persistante
          then:
            - action: persistent_notification.create
              data:
                title: !input notif_revision_titre
                message: !input notif_revision_message
                notification_id: "revision_{{ moto_nom | slugify }}"

    # ══════════════════════════════════════════════════════════════════════
    # 🗺️ NOUVEAU TRAJET (voie principale)
    # Déclenchée par moto_verrouillee (locked_sensor → OFF = verrouillé).
    # Signal fiable d'arrêt définitif, insensible aux feux rouges.
    #
    # Stratégie :
    #   1. Appuyer sur btn_refresh_trips pour forcer un fetch immédiat de l'API.
    #   2. Attendre (wait_for_trigger) que last_trip_sensor change, max 3 min.
    #   3. Lire distance_trajet depuis wait.trigger.to_state.attributes (données
    #      fraîches du trigger) ou fallback state_attr si timeout.
    # ══════════════════════════════════════════════════════════════════════
    - conditions:
        - condition: trigger
          id: moto_verrouillee
        - condition: template
          value_template: "{{ notif_trajet_active }}"
      sequence:
        # Forcer un refresh immédiat des trajets
        - action: button.press
          target:
            entity_id: !input btn_refresh_trips

        # Attendre que last_trip_sensor change (max 3 min)
        - wait_for_trigger:
            - trigger: state
              entity_id: !input last_trip_sensor
              not_to:
                - "unavailable"
                - "unknown"
          timeout:
            minutes: 3
          continue_on_timeout: true

        # Lire la distance depuis les attributs du trigger (données fraîches)
        # ou fallback sur state_attr si timeout (wait.trigger est None)
        - variables:
            distance_trajet: >
              {% if wait.trigger %}
                {{ wait.trigger.to_state.attributes.distance_km | float(0) }}
              {% else %}
                {{ state_attr(last_trip_sensor, 'distance_km') | float(0) }}
              {% endif %}

        # Sortie anticipée si trajet trop court
        - condition: template
          value_template: "{{ distance_trajet >= states(n_seuil_distance_trajet) | float(2) }}"

        # Lire l'odometer (à jour via Socket.IO)
        - variables:
            odometer_km_frais: "{{ states(odometer_sensor) | float(0) }}"

        # Si un plein est en cours d'enregistrement, attendre que km_au_dernier_plein
        # soit mis à jour par Python avant de lire l'autonomie restante.
        # plein_pending_at = epoch 1970 → pas de plein en attente.
        - variables:
            dt_plein_pending: >
              {{ odometer_sensor | replace('sensor.', 'datetime.') | replace('_odometer', '_plein_pending_at') }}
            plein_en_cours: >
              {% set v = states(dt_plein_pending) %}
              {% if v in ['unavailable', 'unknown', 'none'] %}
                false
              {% else %}
                {{ (v | as_datetime).year > 1970 }}
              {% endif %}
        - if:
            - condition: template
              value_template: "{{ plein_en_cours }}"
          then:
            - wait_for_trigger:
                - trigger: state
                  entity_id: !input n_km_dernier_plein
              timeout:
                minutes: 8
              continue_on_timeout: true

        # Lire l'autonomie restante (après mise à jour plein si applicable)
        - variables:
            km_restants_trajet: "{{ states(sensor_autonomie_restante) | float(0) | round(1) }}"

        # Notification
        - action: "{{ notify_service }}"
          data:
            title: !input notif_trajet_titre
            message: !input notif_trajet_message
        - if:
            - condition: template
              value_template: !input notif_trajet_persistante
          then:
            - action: persistent_notification.create
              data:
                title: !input notif_trajet_titre
                message: !input notif_trajet_message
                notification_id: "trajet_{{ moto_nom | slugify }}"

    # ══════════════════════════════════════════════════════════════════════
    # 📊 BILAN HEBDOMADAIRE — envoyé le dimanche soir (avant reset lundi minuit)
    # ══════════════════════════════════════════════════════════════════════
    - conditions:
        - condition: trigger
          id: stats_hebdo
        - condition: template
          value_template: "{{ activer_stats_hebdo and now().weekday() == 6 }}"
      sequence:
        - variables:
            n_km_debut_semaine: "{{ odometer_sensor | replace('sensor.', 'number.') | replace('_odometer', '_km_debut_semaine') }}"
            km_semaine: "{{ [states(odometer_sensor) | float(0) - states(n_km_debut_semaine) | float(0), 0] | max | round(1) }}"
            odometer_km: "{{ states(odometer_sensor) | float(0) | round(0) }}"
            km_restants_notif: "{{ states(sensor_autonomie_restante) | float(0) | round(1) }}"
            message_hebdo: >
              Bilan semaine — {{ moto_nom }} :
              {{ km_semaine }} km cette semaine.
              Kilométrage total : {{ odometer_km }} km.
              Autonomie restante : {{ km_restants_notif }} km.
        - if:
            - condition: template
              value_template: "{{ stats_hebdo_mobile }}"
          then:
            - action: "{{ notify_service }}"
              data:
                title: "📊 Bilan hebdo — {{ moto_nom }}"
                message: "{{ message_hebdo }}"
        - if:
            - condition: template
              value_template: "{{ stats_hebdo_persistante }}"
          then:
            - action: persistent_notification.create
              data:
                title: "📊 Bilan hebdo — {{ moto_nom }}"
                message: "{{ message_hebdo }}"
                notification_id: "stats_hebdo_{{ moto_nom | slugify }}"

    # ══════════════════════════════════════════════════════════════════════
    # 📊 BILAN MENSUEL — envoyé le dernier jour du mois (avant reset le 1er à minuit)
    # ══════════════════════════════════════════════════════════════════════
    - conditions:
        - condition: trigger
          id: stats_mensuelles
        - condition: template
          value_template: >
            {{ activer_stats_mensuelles and (now() + timedelta(days=1)).day == 1 }}
      sequence:
        - variables:
            n_km_debut_mois: "{{ odometer_sensor | replace('sensor.', 'number.') | replace('_odometer', '_km_debut_mois') }}"
            km_mois: "{{ [states(odometer_sensor) | float(0) - states(n_km_debut_mois) | float(0), 0] | max | round(1) }}"
            odometer_km: "{{ states(odometer_sensor) | float(0) | round(0) }}"
            km_restants_notif: "{{ states(sensor_autonomie_restante) | float(0) | round(1) }}"
            message_mensuel: >
              Bilan mensuel — {{ moto_nom }} :
              {{ km_mois }} km ce mois.
              Kilométrage total : {{ odometer_km }} km.
              Autonomie restante : {{ km_restants_notif }} km.
        - if:
            - condition: template
              value_template: "{{ stats_mensuelles_mobile }}"
          then:
            - action: "{{ notify_service }}"
              data:
                title: "📊 Bilan mensuel — {{ moto_nom }}"
                message: "{{ message_mensuel }}"
        - if:
            - condition: template
              value_template: "{{ stats_mensuelles_persistante }}"
          then:
            - action: persistent_notification.create
              data:
                title: "📊 Bilan mensuel — {{ moto_nom }}"
                message: "{{ message_mensuel }}"
                notification_id: "stats_mensuelles_{{ moto_nom | slugify }}"

    # ══════════════════════════════════════════════════════════════════════
    # ✅ CONFIRMATION — PLEIN EFFECTUÉ
    # Le bouton Python btn_confirmer_le_plein gère tout :
    #   - attend 5 min d'arrêt puis appelle l'API pour l'odometer précis
    #   - met à jour km_au_dernier_plein et la moyenne glissante inter-plein
    # binary_sensor.<moto>_plein_requis repasse à off automatiquement dès que
    # l'autonomie recalculée dépasse à nouveau le seuil.
    #
    # Après le 2ème plein : notification de proposition si la moyenne calculée
    # diffère de l'autonomie totale actuelle → boutons Appliquer / Garder.
    # ══════════════════════════════════════════════════════════════════════
    - conditions:
        - condition: trigger
          id: confirm_plein
      sequence:
        - action: button.press
          target:
            entity_id: !input btn_confirmer_le_plein
        - action: "{{ notify_service }}"
          data:
            title: "⛽ Plein en cours d'enregistrement — {{ moto_nom }}"
            message: >
              Le plein sera enregistré après confirmation d'arrêt (sous 5 min).
              L'autonomie sera recalculée automatiquement.
        # Attendre que le bouton Python ait calculé la nouvelle moyenne
        # (déclenché au prochain verrouillage, typiquement ≤ 5 min)
        - delay: "00:06:00"
        - variables:
            nb_pleins_enregistres: >
              {% set p = moto_nom | lower | replace(' ', '_') %}
              {{ states('number.' ~ p ~ '_carburant_nombre_de_pleins_enregistres') | float(0) | int }}
            autonomie_moyenne: >
              {% set p = moto_nom | lower | replace(' ', '_') %}
              {{ states('number.' ~ p ~ '_carburant_autonomie_moyenne_calculee') | float(0) | round(1) }}
            autonomie_actuelle: >
              {{ states(n_autonomie_totale) | float(0) | round(1) }}
        - if:
            - condition: template
              value_template: "{{ nb_pleins_enregistres >= 2 and autonomie_moyenne > 0 and autonomie_moyenne != autonomie_actuelle }}"
          then:
            - action: "{{ notify_service }}"
              data:
                title: "📊 Nouvelle autonomie calculée — {{ moto_nom }}"
                message: >
                  Moyenne sur {{ nb_pleins_enregistres }} pleins : {{ autonomie_moyenne }} km.
                  Autonomie actuelle : {{ autonomie_actuelle }} km.
                  Voulez-vous mettre à jour la référence ?
                data:
                  actions:
                    - action: "{{ action_appliquer_autonomie }}"
                      title: "✅ Appliquer ({{ autonomie_moyenne }} km)"
                    - action: DISMISS
                      title: "❌ Garder ({{ autonomie_actuelle }} km)"

    # ══════════════════════════════════════════════════════════════════════
    # ✅ APPLICATION — AUTONOMIE CALCULÉE CONFIRMÉE
    # Déclenché par l'action mobile "Appliquer" de la notification de proposition.
    # Appuie sur le bouton Python qui copie autonomie_moyenne_calculee → autonomie_totale.
    # ══════════════════════════════════════════════════════════════════════
    - conditions:
        - condition: trigger
          id: confirm_appliquer_autonomie
      sequence:
        - action: button.press
          target:
            entity_id: !input btn_appliquer_autonomie
        - variables:
            autonomie_nouvelle: >
              {% set p = moto_nom | lower | replace(' ', '_') %}
              {{ states('number.' ~ p ~ '_carburant_autonomie_moyenne_calculee') | float(0) | round(1) }}
        - action: "{{ notify_service }}"
          data:
            title: "✅ Autonomie mise à jour — {{ moto_nom }}"
            message: >
              Autonomie de référence : {{ autonomie_nouvelle }} km.

    # ══════════════════════════════════════════════════════════════════════
    # ✅ CONFIRMATION — CHAÎNE ENTRETENUE
    # ══════════════════════════════════════════════════════════════════════
    - conditions:
        - condition: trigger
          id: confirm_chaine
      sequence:
        - variables:
            odometer_km: "{{ states(odometer_sensor) | float(0) }}"
        - action: number.set_value
          target:
            entity_id: !input n_km_dernier_entretien_chaine
          data:
            value: "{{ odometer_km }}"
        - action: datetime.set_value
          target:
            entity_id: !input dt_date_dernier_entretien_chaine
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        - action: "{{ notify_service }}"
          data:
            title: "✅ Chaîne entretenue — {{ moto_nom }}"
            message: >
              Entretien chaîne enregistré à {{ odometer_km | round(0) }} km
              le {{ now().strftime('%d/%m/%Y') }}.

    # ══════════════════════════════════════════════════════════════════════
    # ✅ CONFIRMATION — VIDANGE EFFECTUÉE
    # ══════════════════════════════════════════════════════════════════════
    - conditions:
        - condition: trigger
          id: confirm_vidange
      sequence:
        - variables:
            odometer_km: "{{ states(odometer_sensor) | float(0) }}"
        - action: number.set_value
          target:
            entity_id: !input n_km_dernier_entretien_vidange
          data:
            value: "{{ odometer_km }}"
        - action: datetime.set_value
          target:
            entity_id: !input dt_date_dernier_entretien_vidange
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        - action: "{{ notify_service }}"
          data:
            title: "✅ Vidange effectuée — {{ moto_nom }}"
            message: >
              Vidange enregistrée à {{ odometer_km | round(0) }} km
              le {{ now().strftime('%d/%m/%Y') }}.

    # ══════════════════════════════════════════════════════════════════════
    # ✅ CONFIRMATION — RÉVISION EFFECTUÉE
    # ══════════════════════════════════════════════════════════════════════
    - conditions:
        - condition: trigger
          id: confirm_revision
      sequence:
        - variables:
            odometer_km: "{{ states(odometer_sensor) | float(0) }}"
        - action: number.set_value
          target:
            entity_id: !input n_km_dernier_entretien_revision
          data:
            value: "{{ odometer_km }}"
        - action: datetime.set_value
          target:
            entity_id: !input dt_date_dernier_entretien_revision
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        - action: "{{ notify_service }}"
          data:
            title: "✅ Révision effectuée — {{ moto_nom }}"
            message: >
              Révision enregistrée à {{ odometer_km | round(0) }} km
              le {{ now().strftime('%d/%m/%Y') }}.


    # ══════════════════════════════════════════════════════════════════════
    # 🚨 ALARME REÇUE
    # ══════════════════════════════════════════════════════════════════════
    - conditions:
        - condition: trigger
          id: nouvelle_alarme
      sequence:
        - variables:
            alarm_type: "{{ states(last_alarm_sensor) }}"
            alarm_timestamp: "{{ state_attr(last_alarm_sensor, 'timestamp') | default('') }}"
            alarm_device: "{{ state_attr(last_alarm_sensor, 'device_name') | default(moto_nom) }}"
            is_crash: "{{ alarm_type in ['alarm_crash', 'alarm_crashParking'] }}"
            is_vibration: "{{ alarm_type == 'alarm_vibration' }}"
            is_power: "{{ alarm_type in ['alarm_powerCut', 'alarm_powerUncut'] }}"
            alarm_label: >
              {% if alarm_type == 'alarm_crash' %}💥 Chute détectée
              {% elif alarm_type == 'alarm_crashParking' %}💥 Chute (parking)
              {% elif alarm_type == 'alarm_vibration' %}🔔 Vibration / Mouvement suspect
              {% elif alarm_type == 'alarm_powerCut' %}🔌 Coupure alimentation
              {% elif alarm_type == 'alarm_powerUncut' %}🔌 Alimentation rétablie
              {% elif alarm_type == 'alarm_exitZone' %}📍 Sortie de zone
              {% elif alarm_type == 'alarm_batteryWarning' %}🪫 Batterie faible
              {% elif alarm_type == 'alarm_temperatureWarning' %}🌡️ Alerte température
              {% elif alarm_type == 'alarm_deviceOffline' %}📵 Tracker hors ligne
              {% elif alarm_type == 'alarm_deviceOnline' %}📶 Tracker en ligne
              {% elif alarm_type == 'alarm_magnetOn' %}🧲 Aimant détecté
              {% elif alarm_type == 'alarm_magnetOff' %}🧲 Aimant retiré
              {% elif alarm_type == 'alarm_sonorAlarmOn' %}🔊 Alarme sonore déclenchée
              {% else %}⚠️ Alarme : {{ alarm_type }}
              {% endif %}
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ notif_alarme_crash and is_crash }}"
              sequence:
                - action: "{{ notify_service }}"
                  data:
                    title: "{{ alarm_label }} — {{ moto_nom }}"
                    message: >
                      {{ alarm_label }} sur {{ alarm_device }}.
                      {% if alarm_timestamp %}Heure : {{ alarm_timestamp }}.{% endif %}
                    data:
                      push:
                        sound: "default"
                        interruption-level: "critical"
            - conditions:
                - condition: template
                  value_template: "{{ notif_alarme_vol and is_vibration }}"
              sequence:
                - action: "{{ notify_service }}"
                  data:
                    title: "{{ alarm_label }} — {{ moto_nom }}"
                    message: >
                      {{ alarm_label }} sur {{ alarm_device }}.
                      {% if alarm_timestamp %}Heure : {{ alarm_timestamp }}.{% endif %}
            - conditions:
                - condition: template
                  value_template: "{{ notif_alarme_alimentation and is_power }}"
              sequence:
                - action: "{{ notify_service }}"
                  data:
                    title: "{{ alarm_label }} — {{ moto_nom }}"
                    message: >
                      {{ alarm_label }} sur {{ alarm_device }}.
                      {% if alarm_timestamp %}Heure : {{ alarm_timestamp }}.{% endif %}
            - conditions:
                - condition: template
                  value_template: "{{ notif_alarme_autres and not is_crash and not is_vibration and not is_power }}"
              sequence:
                - action: "{{ notify_service }}"
                  data:
                    title: "{{ alarm_label }} — {{ moto_nom }}"
                    message: >
                      {{ alarm_label }} sur {{ alarm_device }}.
                      {% if alarm_timestamp %}Heure : {{ alarm_timestamp }}.{% endif %}

mode: queued
max: 10